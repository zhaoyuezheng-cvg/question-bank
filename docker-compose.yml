version: '3.8'

services:
  question-bank:
    build: .
    container_name: question-bank
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_API_BASE=${AI_API_BASE:-https://api.openai.com/v1}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
      - DATABASE_URL=file:/app/data/question-bank.db
    volumes:
      - qb-data:/app/data
      - qb-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  qb-data:
  qb-uploads:
